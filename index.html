<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper + TTS + Avatar</title>

<script type="importmap">
{ "imports":
  {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin-top: 20px; font-size: 26px; font-weight: 300; color: #fff; }
  h1 span { color: #4fc3f7; font-weight: 600; }
  .subtitle { color: #666; font-size: 13px; margin-top: 4px; }

  .tabs { display: flex; gap: 0; margin-top: 16px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  .tab {
    padding: 10px 32px; background: #141414; color: #888; cursor: pointer;
    font-size: 14px; border: none; transition: all 0.2s;
  }
  .tab:hover { color: #ccc; }
  .tab.active { background: #1e2a30; color: #4fc3f7; }

  .panel { display: none; width: 90%; max-width: 900px; }
  .panel.active { display: flex; flex-direction: column; align-items: center; }

  /* STT */
  .controls { margin-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #recordBtn {
    width: 100px; height: 100px; border-radius: 50%; border: 3px solid #333;
    background: #1a1a1a; color: #fff; font-size: 14px; cursor: pointer;
    transition: all 0.3s; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px;
  }
  #recordBtn:hover { border-color: #4fc3f7; background: #1e2a30; }
  #recordBtn.recording { border-color: #ef5350; background: #2a1515; animation: pulse 1.5s infinite; }
  #recordBtn .icon { font-size: 28px; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,83,80,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(239,83,80,0); }
  }

  .status { font-size: 14px; color: #888; min-height: 20px; }
  .status.processing { color: #ffd54f; }
  .status.error { color: #ef5350; }
  .status.success { color: #66bb6a; }
  .timer { font-family: monospace; font-size: 20px; color: #ef5350; min-height: 24px; }

  .result-container { margin-top: 16px; width: 100%; padding-bottom: 30px; }
  .result-card {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    padding: 20px; margin-bottom: 12px;
  }
  .result-card .meta { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .result-card .meta .tag {
    background: #1e1e1e; padding: 4px 10px; border-radius: 20px; font-size: 11px; color: #aaa;
  }
  .result-card .meta .tag b { color: #4fc3f7; }
  .result-card .text { font-size: 17px; line-height: 1.6; color: #fff; white-space: pre-wrap; }
  .segments { margin-top: 12px; border-top: 1px solid #222; padding-top: 12px; }
  .segments summary { cursor: pointer; color: #666; font-size: 13px; }
  .seg-line { display: flex; gap: 12px; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #1a1a1a; }
  .seg-line .time { color: #4fc3f7; font-family: monospace; font-size: 11px; min-width: 110px; padding-top: 2px; }

  /* TTS */
  .tts-layout { display: flex; gap: 20px; margin-top: 20px; width: 100%; }
  .tts-left { flex: 1; min-width: 0; }
  .tts-right { width: 350px; flex-shrink: 0; }

  #avatarContainer {
    width: 350px; height: 400px; background: #111; border-radius: 12px;
    border: 1px solid #222; overflow: hidden; position: relative;
  }
  #avatarLoading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #666; font-size: 14px; z-index: 10;
  }

  .tts-box textarea {
    width: 100%; min-height: 140px; background: #141414; border: 1px solid #333;
    border-radius: 8px; color: #fff; font-size: 15px; padding: 14px;
    font-family: inherit; resize: vertical;
  }
  .tts-box textarea:focus { outline: none; border-color: #4fc3f7; }
  .tts-controls { display: flex; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .tts-controls select {
    background: #1a1a1a; border: 1px solid #333; color: #e0e0e0;
    padding: 9px 12px; border-radius: 8px; font-size: 13px;
  }
  .tts-controls select:focus { outline: none; border-color: #4fc3f7; }
  #speakBtn {
    padding: 9px 24px; background: #4fc3f7; color: #000; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  #speakBtn:hover { background: #81d4fa; }
  #speakBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #ttsStatus { font-size: 13px; color: #888; min-height: 18px; margin-top: 10px; }
  .tts-history { margin-top: 16px; padding-bottom: 30px; }
  .tts-card {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    padding: 16px; margin-bottom: 10px;
  }
  .tts-card .tts-text { color: #ccc; font-size: 14px; margin-bottom: 10px; line-height: 1.4; }
  .tts-card .tts-meta { font-size: 11px; color: #666; margin-bottom: 8px; }
  .tts-card audio { width: 100%; height: 32px; }

  @media (max-width: 800px) {
    .tts-layout { flex-direction: column-reverse; }
    .tts-right { width: 100%; }
    #avatarContainer { width: 100%; height: 350px; }
  }
</style>
</head>
<body>

<h1>Faster <span>Whisper</span> + <span>TTS</span></h1>
<p class="subtitle">large-v3 CUDA | Edge TTS | TalkingHead 3D</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('stt')">Voz para Texto</button>
  <button class="tab" onclick="switchTab('tts')">Texto para Voz</button>
</div>

<!-- STT Panel -->
<div id="stt-panel" class="panel active">
  <div class="controls">
    <button id="recordBtn" onclick="toggleRecord()">
      <span class="icon">&#127908;</span>
      <span id="btnLabel">Gravar</span>
    </button>
    <div id="timer" class="timer"></div>
    <div id="status" class="status">Clique para gravar</div>
  </div>
  <div class="result-container"><div id="results"></div></div>
</div>

<!-- TTS Panel -->
<div id="tts-panel" class="panel">
  <div class="tts-layout">
    <div class="tts-left">
      <div class="tts-box">
        <textarea id="ttsText" placeholder="Digite o texto para converter em fala..."></textarea>
        <div class="tts-controls">
          <select id="voiceSelect">
            <option value="pt-BR-FranciscaNeural" selected>Francisca - BR (Feminino)</option>
            <option value="pt-BR-AntonioNeural">Antonio - BR (Masculino)</option>
            <option value="pt-BR-ThalitaMultilingualNeural">Thalita - BR (Multilingual)</option>
            <option value="pt-PT-RaquelNeural">Raquel - PT (Feminino)</option>
            <option value="pt-PT-DuarteNeural">Duarte - PT (Masculino)</option>
          </select>
          <button id="speakBtn" onclick="speak()">Falar</button>
        </div>
        <div id="ttsStatus"></div>
      </div>
      <div class="tts-history" id="ttsHistory"></div>
    </div>
    <div class="tts-right">
      <div id="avatarContainer">
        <div id="avatarLoading">Carregando avatar...</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { TalkingHead } from "talkinghead";

let head = null;
let avatarReady = false;

async function initAvatar() {
  const container = document.getElementById('avatarContainer');
  const loading = document.getElementById('avatarLoading');

  try {
    head = new TalkingHead(container, {
      lipsyncModules: ["en", "fi"],
      cameraView: "head",
      modelFPS: 30
    });

    await head.showAvatar({
      url: '/avatars/avatar.glb',
      body: 'M',
      avatarMood: 'neutral',
      lipsyncLang: 'en'
    }, (ev) => {
      if (ev.lengthComputable) {
        let pct = Math.min(100, Math.round(ev.loaded / ev.total * 100));
        loading.textContent = "Carregando avatar " + pct + "%";
      }
    });

    loading.style.display = 'none';
    avatarReady = true;

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") head.start();
      else head.stop();
    });

  } catch (err) {
    console.error("Avatar error:", err);
    loading.textContent = "Erro: " + err.message;
  }
}

// TTS with avatar lip-sync
window.speak = async function() {
  const text = document.getElementById('ttsText').value.trim();
  if (!text) return;
  const voice = document.getElementById('voiceSelect').value;
  const btn = document.getElementById('speakBtn');
  const statusEl = document.getElementById('ttsStatus');

  btn.disabled = true;
  btn.textContent = 'Gerando...';
  statusEl.textContent = 'Gerando audio e lip-sync...';
  statusEl.style.color = '#ffd54f';

  try {
    const resp = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice, lipsync: avatarReady })
    });

    if (!resp.ok) {
      const err = await resp.json();
      statusEl.textContent = 'Erro: ' + (err.error || 'desconhecido');
      statusEl.style.color = '#ef5350';
      return;
    }

    if (avatarReady) {
      // Lipsync mode: JSON with base64 audio + word timestamps
      const data = await resp.json();
      if (data.error) {
        statusEl.textContent = 'Erro: ' + data.error;
        statusEl.style.color = '#ef5350';
        return;
      }

      // Decode base64 audio
      const audioBytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
      const audioBuffer = await head.audioCtx.decodeAudioData(audioBytes.buffer);

      // Build TalkingHead audio object
      const audioObj = {
        audio: audioBuffer,
        words: data.words,
        wtimes: data.wtimes,
        wdurations: data.wdurations,
        markers: [],
        mtimes: []
      };

      // Make avatar look at camera and gesture
      if (data.words.length > 3) {
        audioObj.markers.push(() => { head.lookAtCamera(500); head.speakWithHands(); });
        audioObj.mtimes.push(0);
      }

      head.speakAudio(audioObj);
      statusEl.textContent = 'Avatar falando!';
      statusEl.style.color = '#66bb6a';

      // Add to history with playable audio
      const blob = new Blob([audioBytes], { type: 'audio/mpeg' });
      const url = URL.createObjectURL(blob);
      addTTSHistory(text, voice, url);

    } else {
      // No avatar: simple audio playback
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
      statusEl.textContent = 'Audio gerado!';
      statusEl.style.color = '#66bb6a';
      addTTSHistory(text, voice, url);
    }

  } catch (err) {
    statusEl.textContent = 'Erro: ' + err.message;
    statusEl.style.color = '#ef5350';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Falar';
  }
};

function addTTSHistory(text, voice, audioUrl) {
  const history = document.getElementById('ttsHistory');
  const card = document.createElement('div');
  card.className = 'tts-card';
  const voiceName = document.getElementById('voiceSelect').selectedOptions[0].textContent;
  const now = new Date().toLocaleTimeString('pt-BR');
  card.innerHTML =
    '<div class="tts-meta">&#128336; ' + now + ' | Voz: ' + esc(voiceName) + '</div>' +
    '<div class="tts-text">' + esc(text) + '</div>' +
    '<audio controls src="' + audioUrl + '"></audio>';
  history.insertBefore(card, history.firstChild);
}

// Initialize avatar when TTS tab is first shown
let avatarInited = false;
const origSwitchTab = window.switchTab;
window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'stt' && i === 0) || (tab === 'tts' && i === 1));
  });
  document.getElementById('stt-panel').classList.toggle('active', tab === 'stt');
  document.getElementById('tts-panel').classList.toggle('active', tab === 'tts');
  if (tab === 'tts' && !avatarInited) {
    avatarInited = true;
    initAvatar();
  }
};

// =================== STT ===================
let mediaRecorder = null, audioChunks = [], isRecording = false, timerInterval = null, startTime = 0;

window.toggleRecord = async function() {
  isRecording ? stopRecording() : await startRecording();
};

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); sendAudio(); };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('btnLabel').textContent = 'Parar';
    setStatus('Gravando...', '');
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer').textContent =
        String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }, 200);
  } catch (err) { setStatus('Erro ao acessar microfone: ' + err.message, 'error'); }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('btnLabel').textContent = 'Gravar';
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '';
}

async function sendAudio() {
  setStatus('Transcrevendo com GPU...', 'processing');
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const fd = new FormData();
  fd.append('audio', blob, 'recording.webm');
  try {
    const resp = await fetch('/transcribe', { method: 'POST', body: fd });
    const data = await resp.json();
    if (data.error) { setStatus('Erro: ' + data.error, 'error'); return; }
    setStatus('Pronto! ' + data.processing_time + 's de processamento', 'success');
    addResult(data);
  } catch (err) { setStatus('Erro de conexao: ' + err.message, 'error'); }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function addResult(data) {
  const container = document.getElementById('results');
  const card = document.createElement('div');
  card.className = 'result-card';
  let segHtml = '';
  if (data.segments && data.segments.length > 0) {
    segHtml = '<div class="segments"><details><summary>Segmentos (' + data.segments.length + ')</summary>';
    data.segments.forEach(s => {
      segHtml += '<div class="seg-line"><span class="time">' + s.start.toFixed(2) + 's -> ' + s.end.toFixed(2) + 's</span><span>' + esc(s.text) + '</span></div>';
    });
    segHtml += '</details></div>';
  }
  const now = new Date().toLocaleTimeString('pt-BR');
  card.innerHTML =
    '<div class="meta">' +
      '<span class="tag">&#128336; ' + now + '</span>' +
      '<span class="tag">&#127760; <b>' + data.language + '</b> (' + (data.language_probability*100).toFixed(0) + '%)</span>' +
      '<span class="tag">&#9201; Audio: <b>' + data.duration + 's</b></span>' +
      '<span class="tag">&#9889; GPU: <b>' + data.processing_time + 's</b></span>' +
    '</div>' +
    '<div class="text">' + esc(data.text || '(silencio)') + '</div>' + segHtml;
  container.insertBefore(card, container.firstChild);
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
